<!-- localStorage shim that mimics window.storage API -->
<script>
window.storage = {
  get: async (key) => {
    const v = localStorage.getItem(key);
    if (v === null) return null;
    return { key, value: v };
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    return { key, value };
  },
  delete: async (key) => {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
  list: async (prefix = "") => {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith(prefix)) keys.push(k);
    }
    return { keys, prefix };
  }
};

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
  });
}

const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const dayShort = ["S","M","T","W","T","F","S"];
const fmtDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

function calcBMR(weight, height, age, sex) {
  const w = parseFloat(weight), h = parseFloat(height), a = parseFloat(age);
  if (!w || !h || !a) return 0;
  return sex === "male" ? 10*w + 6.25*h - 5*a + 5 : 10*w + 6.25*h - 5*a - 161;
}
function calcCardioCalories(met, durationMin, weightKg, incline = 0) {
  const w = parseFloat(weightKg) || 70;
  return Math.round((met * 3.5 * w * (1 + incline*0.04) / 200) * durationMin);
}
function calcLiftCalories(sets, weightKg) {
  const w = parseFloat(weightKg) || 70;
  return Math.round((5 * 3.5 * w / 200) * sets * 1.5);
}
function calcStepCalories(steps, weightKg) {
  const w = parseFloat(weightKg) || 70;
  return Math.round(steps * 0.0005 * w);
}
const activityMultipliers = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, athlete: 1.9 };
const goalAdjustments = { cut: -500, recomp: -250, maintain: 0, lean_bulk: 250, bulk: 500 };

function IronLog() {
  const [view, setView] = useState("today");
  const [selectedDate, setSelectedDate] = useState(new Date());
  const [calendarMonth, setCalendarMonth] = useState(new Date());
  const [logs, setLogs] = useState({});
  const [foodLogs, setFoodLogs] = useState({});
  const [cardioLogs, setCardioLogs] = useState({});
  const [stepLogs, setStepLogs] = useState({});
  const [customPlan, setCustomPlan] = useState(null);
  const [profile, setProfile] = useState({ weight:"", height:"", age:"", sex:"male", activity:"moderate", goal:"maintain", stepGoal:10000 });
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const [w,f,c,s,p,pl] = await Promise.all([
          window.storage.get("workout-logs").catch(()=>null),
          window.storage.get("food-logs").catch(()=>null),
          window.storage.get("cardio-logs").catch(()=>null),
          window.storage.get("step-logs").catch(()=>null),
          window.storage.get("profile").catch(()=>null),
          window.storage.get("custom-plan").catch(()=>null),
        ]);
        if (w?.value) setLogs(JSON.parse(w.value));
        if (f?.value) setFoodLogs(JSON.parse(f.value));
        if (c?.value) setCardioLogs(JSON.parse(c.value));
        if (s?.value) setStepLogs(JSON.parse(s.value));
        if (p?.value) setProfile(JSON.parse(p.value));
        if (pl?.value && pl.value !== "null") setCustomPlan(JSON.parse(pl.value));
      } catch {}
      setLoading(false);
    })();
  }, []);

  const saveData = async (key, value) => {
    setSaving(true);
    try { await window.storage.set(key, JSON.stringify(value)); } catch {}
    setTimeout(()=>setSaving(false), 400);
  };

  const plan = customPlan || defaultPlan;
  const dateKey = fmtDate(selectedDate);
  const dow = selectedDate.getDay();
  const todayPlan = plan[dow];
  const dayLogs = logs[dateKey] || {};
  const todayFood = foodLogs[dateKey] || [];
  const todayCardio = cardioLogs[dateKey] || [];
  const todaySteps = stepLogs[dateKey] || 0;

  const toggleExercise = (idx) => {
    const newLogs = { ...logs, [dateKey]: { ...dayLogs, [idx]: !dayLogs[idx] }};
    setLogs(newLogs); saveData("workout-logs", newLogs);
  };
  const updateExercise = (dayKey, idx, updates) => {
    const newPlan = JSON.parse(JSON.stringify(plan));
    newPlan[dayKey].exercises[idx] = { ...newPlan[dayKey].exercises[idx], ...updates };
    setCustomPlan(newPlan); saveData("custom-plan", newPlan);
  };
  const addExercise = (dayKey, exercise) => {
    const newPlan = JSON.parse(JSON.stringify(plan));
    newPlan[dayKey].exercises.push(exercise);
    setCustomPlan(newPlan); saveData("custom-plan", newPlan);
  };
  const deleteExercise = (dayKey, idx) => {
    const newPlan = JSON.parse(JSON.stringify(plan));
    newPlan[dayKey].exercises.splice(idx, 1);
    setCustomPlan(newPlan); saveData("custom-plan", newPlan);
  };
  const resetPlan = () => { setCustomPlan(null); saveData("custom-plan", null); };

  const addFood = (food, multiplier = 1) => {
    const entry = {
      id: Date.now(), name: food.name, serving: food.serving, multiplier,
      kcal: Math.round(food.kcal * multiplier),
      p: +(food.p * multiplier).toFixed(1), c: +(food.c * multiplier).toFixed(1),
      f: +(food.f * multiplier).toFixed(1), fb: +(food.fb * multiplier).toFixed(1),
      s: +(food.s * multiplier).toFixed(1),
    };
    const newLogs = { ...foodLogs, [dateKey]: [...todayFood, entry] };
    setFoodLogs(newLogs); saveData("food-logs", newLogs);
  };
  const removeFood = (id) => {
    const newLogs = { ...foodLogs, [dateKey]: todayFood.filter(e=>e.id!==id) };
    setFoodLogs(newLogs); saveData("food-logs", newLogs);
  };
  const addCardio = (entry) => {
    const newLogs = { ...cardioLogs, [dateKey]: [...todayCardio, { ...entry, id: Date.now() }] };
    setCardioLogs(newLogs); saveData("cardio-logs", newLogs);
  };
  const removeCardio = (id) => {
    const newLogs = { ...cardioLogs, [dateKey]: todayCardio.filter(e=>e.id!==id) };
    setCardioLogs(newLogs); saveData("cardio-logs", newLogs);
  };
  const updateSteps = (steps) => {
    const newLogs = { ...stepLogs, [dateKey]: steps };
    setStepLogs(newLogs); saveData("step-logs", newLogs);
  };
  const updateProfile = (newProfile) => { setProfile(newProfile); saveData("profile", newProfile); };

  const foodTotals = useMemo(()=>todayFood.reduce((acc,e)=>({
    kcal:acc.kcal+e.kcal, p:acc.p+e.p, c:acc.c+e.c, f:acc.f+e.f, fb:acc.fb+e.fb, s:acc.s+e.s,
  }),{kcal:0,p:0,c:0,f:0,fb:0,s:0}),[todayFood]);

  const liftingBurn = useMemo(()=>{
    if (!todayPlan.exercises) return 0;
    const sets = todayPlan.exercises.reduce((sum,ex,i)=>sum+(dayLogs[i]?ex.sets:0),0);
    return calcLiftCalories(sets, profile.weight);
  },[todayPlan,dayLogs,profile.weight]);
  const cardioBurn = useMemo(()=>todayCardio.reduce((s,c)=>s+c.kcal,0),[todayCardio]);
  const stepBurn = useMemo(()=>calcStepCalories(todaySteps, profile.weight),[todaySteps,profile.weight]);
  const totalBurn = liftingBurn + cardioBurn + stepBurn;

  const targets = useMemo(()=>{
    const bmr = calcBMR(profile.weight, profile.height, profile.age, profile.sex);
    if (!bmr) return null;
    const tdee = bmr * activityMultipliers[profile.activity];
    const target = Math.round(tdee + goalAdjustments[profile.goal]);
    const w = parseFloat(profile.weight) || 70;
    const protein = Math.round(w * 2);
    const fat = Math.round((target * 0.25) / 9);
    const carbs = Math.round((target - protein*4 - fat*9) / 4);
    return { kcal:target, p:protein, c:carbs, f:fat, fb:30, bmr:Math.round(bmr), tdee:Math.round(tdee) };
  },[profile]);

  const netCalories = foodTotals.kcal - totalBurn;
  const completedCount = todayPlan.exercises.filter((_,i)=>dayLogs[i]).length;
  const totalCount = todayPlan.exercises.length;
  const progress = totalCount > 0 ? Math.round((completedCount/totalCount)*100) : 0;

  const today = new Date();
  let streak = 0; let cursor = new Date(today);
  while (true) {
    const k = fmtDate(cursor);
    const dp = plan[cursor.getDay()];
    if (dp.isRest) { cursor.setDate(cursor.getDate()-1); if (streak>100) break; continue; }
    const dl = logs[k];
    if (!dl || !Object.values(dl).some(Boolean)) break;
    streak++; cursor.setDate(cursor.getDate()-1);
    if (streak>365) break;
  }

  if (loading) return <div style={{minHeight:"100vh",background:"#0a0a0a",color:"#666",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace"}}>Loading...</div>;

  const isToday = fmtDate(today) === dateKey;

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0a",fontFamily:"'DM Mono','Courier New',monospace",color:"#e8e8e8",paddingBottom:90}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        button, input, select { font-family: inherit; }
        button { cursor: pointer; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease forwards; }
        .ex-row:active, .food-row:active { transform: scale(0.99); }
        input, select, textarea {
          background: #1a1a1a; border: 1px solid #2a2a2a; color: #e8e8e8;
          padding: 10px 12px; border-radius: 4px; font-size: 13px; width: 100%;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #FF6B35; }
      `}</style>

      <div style={{padding:"20px 20px 10px",maxWidth:720,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:9,letterSpacing:5,color:"#555"}}>TRAIN · CARDIO · FOOD</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,lineHeight:1,color:"#fff",letterSpacing:2,marginTop:2}}>IRON LOG</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#555",letterSpacing:2}}>STREAK</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:streak>0?"#FF6B35":"#333",lineHeight:1}}>🔥{streak}</div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:3,padding:"0 16px",maxWidth:720,margin:"0 auto 14px",overflowX:"auto"}}>
        {[{id:"today",label:"TRAIN"},{id:"cardio",label:"CARDIO"},{id:"food",label:"FOOD"},{id:"calendar",label:"CAL"},{id:"stats",label:"STATS"},{id:"profile",label:"ME"}].map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)} style={{
            flex:1,padding:"10px 6px",minWidth:50,
            background:view===t.id?"#1a1a1a":"transparent",
            color:view===t.id?"#fff":"#555",
            fontSize:9,letterSpacing:2,
            border:`1px solid ${view===t.id?"#333":"#1a1a1a"}`,
            borderRadius:4,
          }}>{t.label}</button>
        ))}
      </div>

      {view==="today" && <TrainView {...{selectedDate,setSelectedDate,todayPlan,dayLogs,toggle:toggleExercise,progress,completedCount,totalCount,isToday,dateKey,dow,updateExercise,addExercise,deleteExercise,resetPlan,customPlan}} />}
      {view==="cardio" && <CardioView {...{selectedDate,setSelectedDate,isToday,todayCardio,todaySteps,addCardio,removeCardio,updateSteps,profile,stepBurn,cardioBurn,liftingBurn,totalBurn}} />}
      {view==="food" && <FoodView {...{selectedDate,setSelectedDate,isToday,todayFood,totals:foodTotals,targets,totalBurn,netCalories,addFood,removeFood,setView}} />}
      {view==="calendar" && <CalendarView {...{calendarMonth,setCalendarMonth,today,dateKey,setSelectedDate,setView,logs,foodLogs,cardioLogs,plan}} />}
      {view==="stats" && <StatsView {...{logs,foodLogs,cardioLogs,stepLogs,streak,today,targets,plan,profile,onReset:()=>{
        if (confirm("Reset ALL data? Cannot be undone.")) {
          setLogs({}); setFoodLogs({}); setCardioLogs({}); setStepLogs({});
          saveData("workout-logs",{}); saveData("food-logs",{}); saveData("cardio-logs",{}); saveData("step-logs",{});
        }
      }}} />}
      {view==="profile" && <ProfileView {...{profile,updateProfile,targets}} />}

      {saving && <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:"#1a1a1a",border:"1px solid #333",padding:"6px 14px",borderRadius:99,fontSize:10,color:"#888",letterSpacing:2,zIndex:50}}>SAVING...</div>}
    </div>
  );
}

  return (
    <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,gap:8}}>
        <button onClick={()=>{const d=new Date(selectedDate);d.setDate(d.getDate()-1);setSelectedDate(d);}} style={{background:"#161616",border:"1px solid #222",color:"#888",padding:"8px 14px",borderRadius:4,fontSize:14}}>‹</button>

}

        <button onClick={()=>{ if(name.trim()) onSave({name,sets,reps,muscle,note}); }} style={{flex:2,padding:10,background:color,color:"#000",border:"none",borderRadius:4,fontSize:10,letterSpacing:2,fontWeight:700}}>{isNew?"ADD":"SAVE"}</button>
      </div>
    </div>
  );
}

          <div>
            <div style={{fontSize:10,color:todayPlan.color,letterSpacing:4,marginBottom:3}}>{todayPlan.tag}</div>

            <div style={{fontSize:11,color:"#888",marginTop:2}}>{todayPlan.label}</div>
          </div>
          {!todayPlan.isRest && <div style={{textAlign:"right"}}>
            <div style={{fontSize:26,fontFamily:"'Bebas Neue',sans-serif",color:todayPlan.color,lineHeight:1}}>{progress}%</div>
            <div style={{fontSize:9,color:"#555",letterSpacing:2}}>{completedCount}/{totalCount}</div>

        </div>
        {!todayPlan.isRest && <div style={{marginTop:12,background:"#222",borderRadius:99,height:3,overflow:"hidden"}}>
          <div style={{width:`${progress}%`,height:"100%",background:todayPlan.color,transition:"width 0.3s"}} />
        </div>}
      </div>
      {todayPlan.isRest && <div style={{background:"#111",border:"1px solid #222",borderRadius:8,padding:"40px 20px",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>😴</div>
        <div style={{fontSize:11,letterSpacing:4,color:"#666"}}>REST DAY</div>
        <div style={{fontSize:12,color:"#555",marginTop:8}}>Sleep, eat, recover.</div>
      </div>}
      {!todayPlan.isRest && <>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          <button onClick={()=>{setEditMode(!editMode);setEditingIdx(null);}} style={{flex:1,padding:"8px 12px",background:editMode?todayPlan.color:"#1a1a1a",color:editMode?"#000":"#888",border:`1px solid ${editMode?todayPlan.color:"#222"}`,borderRadius:4,fontSize:10,letterSpacing:2,fontWeight:editMode?700:400}}>{editMode?"✓ DONE EDITING":"✎ EDIT WORKOUT"}</button>
          {customPlan && <button onClick={()=>{if(confirm("Reset to default workout plan?")) resetPlan();}} style={{padding:"8px 12px",background:"transparent",border:"1px solid #331a1a",color:"#a44",borderRadius:4,fontSize:10,letterSpacing:2}}>RESET PLAN</button>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {todayPlan.exercises.map((ex,i)=>{
            const done = !!dayLogs[i];
            const isEditing = editingIdx === i;
            return <div key={i} style={{background:"#111",border:`1px solid ${done?todayPlan.color+"55":isEditing?"#444":"#1e1e1e"}`,borderRadius:6,padding:"12px 14px",opacity:done&&!editMode?0.5:1,transition:"all 0.2s"}}>
              {!isEditing && <div className="ex-row" onClick={()=>editMode?setEditingIdx(i):toggle(i)} style={{display:"flex",alignItems:"flex-start",gap:12}}>
                {!editMode && <div style={{width:22,height:22,borderRadius:4,flexShrink:0,marginTop:1,background:done?todayPlan.color:"transparent",border:`2px solid ${done?todayPlan.color:"#333"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>{done && <span style={{color:"#000",fontWeight:700,fontSize:13}}>✓</span>}</div>}
                {editMode && <div style={{width:22,height:22,borderRadius:4,flexShrink:0,marginTop:1,background:"#1a1a1a",border:"1px solid #333",display:"flex",alignItems:"center",justifyContent:"center",color:"#888",fontSize:12}}>✎</div>}

                    <span style={{color:"#444"}}>· {ex.muscle}</span>

          <ExerciseEditor exercise={{name:"",sets:3,reps:"10",muscle:"",note:""}} color={todayPlan.color} onSave={(updates)=>{addExercise(dow,updates);setAdding(false);}} onCancel={()=>setAdding(false)} isNew />
        </div>}
      </>}
    </div>
  );
}

function CardioView({ selectedDate, setSelectedDate, isToday, todayCardio, todaySteps, addCardio, removeCardio, updateSteps, profile, stepBurn, cardioBurn, liftingBurn, totalBurn }) {
  const [pickedType, setPickedType] = useState(null);
  const [duration, setDuration] = useState(30);
  const [speed, setSpeed] = useState(0);
  const [incline, setIncline] = useState(0);
  const [stepInput, setStepInput] = useState(todaySteps);
  useEffect(()=>setStepInput(todaySteps),[todaySteps]);
  const stepGoal = profile.stepGoal || 10000;
  const stepProgress = Math.min(100, Math.round((todaySteps/stepGoal)*100));
  const startCardio = (type) => { setPickedType(type); setDuration(30); setSpeed(type.defaultSpeed||0); setIncline(type.defaultIncline||0); };
  const saveCardio = () => {
    if (!pickedType) return;
    const kcal = calcCardioCalories(pickedType.met, duration, profile.weight, incline);
    addCardio({ type:pickedType.id, name:pickedType.name, icon:pickedType.icon, duration, speed, incline, kcal });
    setPickedType(null);
  };
  return (

function MacroBar({ label, value, target, color, unit, inverse }) {
  const pct = target ? Math.min(100, (value/target)*100) : 0;
  const over = target && value > target;
  return (
    <div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:4,padding:8}}>
      <div style={{fontSize:8,color:"#555",letterSpacing:2}}>{label}</div>
      <div style={{fontSize:14,color:"#ddd",fontFamily:"'Bebas Neue',sans-serif",lineHeight:1,marginTop:4}}>{value.toFixed(0)}{unit}{target&&<span style={{fontSize:9,color:"#666"}}>/{target}</span>}</div>
      <div style={{marginTop:6,background:"#222",height:2,borderRadius:99,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:inverse&&over?"#FF6B6B":color,transition:"width 0.3s"}} />
      </div>
    </div>
  );
}

function CalendarView({ calendarMonth, setCalendarMonth, today, dateKey, setSelectedDate, setView, logs, foodLogs, cardioLogs, plan }) {
  const buildCalendar = () => {
    const year = calendarMonth.getFullYear();
    const month = calendarMonth.getMonth();
    const firstDay = new Date(year,month,1).getDay();
    const daysInMonth = new Date(year,month+1,0).getDate();
    const cells = [];
    for (let i=0; i<firstDay; i++) cells.push(null);
    for (let d=1; d<=daysInMonth; d++) cells.push(new Date(year,month,d));
    return cells;
  };
  const getDayStatus = (date) => {
    if (!date) return {};
    const key = fmtDate(date);
    const dLogs = logs[key];
    const dFood = foodLogs[key];
    const dCardio = cardioLogs[key];
    const dayPlan = plan[date.getDay()];
    let workout = null;
    if (dLogs && !dayPlan.isRest) {
      const total = dayPlan.exercises.length;
      const done = dayPlan.exercises.filter((_,i)=>dLogs[i]).length;
      if (done > 0) workout = done===total ? "full" : "partial";
    }
    return { workout, food: dFood && dFood.length>0, cardio: dCardio && dCardio.length>0 };
  };
  return (
    <div className="fade-in" style={{maxWidth:720,margin:"0 auto",padding:"0 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <button onClick={()=>{const d=new Date(calendarMonth);d.setMonth(d.getMonth()-1);setCalendarMonth(d);}} style={{background:"#161616",border:"1px solid #222",color:"#888",padding:"8px 14px",borderRadius:4}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,color:"#fff"}}>{monthNames[calendarMonth.getMonth()].toUpperCase()}</div>
          <div style={{fontSize:10,color:"#555",letterSpacing:3}}>{calendarMonth.getFullYear()}</div>
        </div>
        <button onClick={()=>{const d=new Date(calendarMonth);d.setMonth(d.getMonth()+1);setCalendarMonth(d);}} style={{background:"#161616",border:"1px solid #222",color:"#888",padding:"8px 14px",borderRadius:4}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {dayShort.map((d,i)=>(<div key={i} style={{textAlign:"center",fontSize:10,color:"#555",letterSpacing:2}}>{d}</div>))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {buildCalendar().map((date,i)=>{
          if (!date) return <div key={i} />;
          const dayPlan = plan[date.getDay()];
          const { workout, food, cardio } = getDayStatus(date);
          const isCurrentDay = fmtDate(date) === fmtDate(today);
          const isSelected = fmtDate(date) === dateKey;
          return <button key={i} onClick={()=>{setSelectedDate(date);setView("today");}} style={{aspectRatio:"1",background:isSelected?"#1a1a1a":"#111",border:`1px solid ${isCurrentDay?"#fff":isSelected?"#444":"#1a1a1a"}`,borderRadius:4,color:"#888",padding:4,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:13,color:isCurrentDay?"#fff":"#aaa",fontWeight:isCurrentDay?600:400}}>{date.getDate()}</div>
            <div style={{display:"flex",gap:2,marginTop:3}}>
              {!dayPlan.isRest && <div style={{width:4,height:4,borderRadius:"50%",background:workout==="full"?dayPlan.color:workout==="partial"?dayPlan.color+"55":"#222"}} />}
              <div style={{width:4,height:4,borderRadius:"50%",background:cardio?"#FF6B35":"#222"}} />
              <div style={{width:4,height:4,borderRadius:"50%",background:food?"#4ECDC4":"#222"}} />
            </div>
          </button>;
        })}
      </div>
      <div style={{marginTop:16,padding:12,background:"#111",border:"1px solid #1a1a1a",borderRadius:6,fontSize:10,color:"#666"}}>
        <div style={{display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:6,height:6,background:"#A78BFA",borderRadius:"50%"}} /> Lift</span>
          <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:6,height:6,background:"#FF6B35",borderRadius:"50%"}} /> Cardio</span>
          <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:6,height:6,background:"#4ECDC4",borderRadius:"50%"}} /> Food</span>
        </div>
      </div>
    </div>
  );
}

function StatCard({ label, value, sub, color }) {
  return (
    <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:6,padding:14}}>
      <div style={{fontSize:9,color:"#555",letterSpacing:3}}>{label}</div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color,lineHeight:1,marginTop:4}}>{value}</div>
      <div style={{fontSize:10,color:"#666",marginTop:4}}>{sub}</div>
    </div>
  );
}

function StatsView({ logs, foodLogs, cardioLogs, stepLogs, streak, today, targets, plan, profile, onReset }) {
  const allLogDates = Object.keys(logs);
  const completedWorkouts = allLogDates.filter(k=>{
    const date = new Date(k+"T00:00:00");
    const dp = plan[date.getDay()];
    if (dp.isRest) return false;
    const dl = logs[k];
    return dp.exercises.every((_,i)=>dl[i]);
  }).length;
  const totalSetsCompleted = allLogDates.reduce((sum,k)=>{
    const date = new Date(k+"T00:00:00");
    const dp = plan[date.getDay()];
    const dl = logs[k] || {};
    return sum + dp.exercises.reduce((s,ex,i)=>s+(dl[i]?ex.sets:0),0);
  },0);
  const totalCardioMin = Object.values(cardioLogs).flat().reduce((s,e)=>s+e.duration,0);
  const totalCardioBurn = Object.values(cardioLogs).flat().reduce((s,e)=>s+e.kcal,0);
  const totalSteps = Object.values(stepLogs).reduce((s,n)=>s+n,0);
  const last7Days = Array.from({length:7}).map((_,i)=>{const d=new Date(today);d.setDate(d.getDate()-i);return fmtDate(d);});
  const last7Cals = last7Days.map(k=>(foodLogs[k]||[]).reduce((s,e)=>s+e.kcal,0));
  const avgCals = Math.round(last7Cals.reduce((a,b)=>a+b,0)/7);
  const daysLogged = last7Cals.filter(c=>c>0).length;
  const last7Steps = last7Days.map(k=>stepLogs[k]||0);
  const avgSteps = Math.round(last7Steps.reduce((a,b)=>a+b,0)/7);
  return (
    <div className="fade-in" style={{maxWidth:720,margin:"0 auto",padding:"0 20px"}}>
      <div style={{fontSize:10,color:"#555",letterSpacing:3,marginBottom:8}}>TRAINING</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <StatCard label="STREAK" value={streak} sub="days in a row" color="#FF6B35" />
        <StatCard label="WORKOUTS" value={completedWorkouts} sub="fully done" color="#4ECDC4" />
        <StatCard label="TOTAL SETS" value={totalSetsCompleted} sub="all time" color="#FFE66D" />
        <StatCard label="ACTIVE DAYS" value={allLogDates.length} sub="days logged" color="#A78BFA" />
      </div>
      <div style={{fontSize:10,color:"#555",letterSpacing:3,marginBottom:8}}>CARDIO & STEPS</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <StatCard label="CARDIO MIN" value={totalCardioMin} sub="all time" color="#34D399" />
        <StatCard label="KCAL BURNED" value={totalCardioBurn} sub="from cardio" color="#FF6B35" />
        <StatCard label="TOTAL STEPS" value={totalSteps.toLocaleString()} sub="all time" color="#A78BFA" />
        <StatCard label="AVG STEPS" value={avgSteps.toLocaleString()} sub="last 7 days" color="#F472B6" />
      </div>
      <div style={{fontSize:10,color:"#555",letterSpacing:3,marginBottom:8}}>NUTRITION (7 DAY)</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <StatCard label="AVG CALORIES" value={avgCals} sub={targets?`target ${targets.kcal}`:"/day"} color="#4ECDC4" />
        <StatCard label="DAYS LOGGED" value={`${daysLogged}/7`} sub="last week" color="#FFE66D" />
      </div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:6,padding:14,marginBottom:14}}>
        <div style={{fontSize:10,color:"#555",letterSpacing:3,marginBottom:10}}>LAST 28 DAYS — WORKOUTS</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(14,1fr)",gap:4}}>
          {Array.from({length:28}).map((_,i)=>{
            const d = new Date(today); d.setDate(d.getDate()-(27-i));
            const dp = plan[d.getDay()];
            const dl = logs[fmtDate(d)];
            let intensity = 0;
            if (dl && !dp.isRest) {
              const total = dp.exercises.length;
              const done = dp.exercises.filter((_,j)=>dl[j]).length;
              if (done>0) intensity = done===total ? 1 : 0.5;
            }
            return <div key={i} title={fmtDate(d)} style={{aspectRatio:"1",borderRadius:3,background:dp.isRest?"#1a1a1a":intensity===1?dp.color:intensity===0.5?dp.color+"66":"#1a1a1a"}} />;
          })}
        </div>
      </div>
      <button onClick={onReset} style={{width:"100%",padding:12,background:"transparent",border:"1px solid #331a1a",color:"#a44",fontSize:10,letterSpacing:3,borderRadius:4}}>RESET ALL DATA</button>
      <div style={{textAlign:"center",marginTop:24,fontSize:9,color:"#333",letterSpacing:2}}>DATA SAVED LOCALLY · WORKS OFFLINE</div>
    </div>
  );
}

function MacroTarget({ label, value, color }) {
  return (
    <div style={{background:"#111",borderRadius:4,padding:8,textAlign:"center"}}>
      <div style={{fontSize:8,color:"#555",letterSpacing:2}}>{label}</div>
      <div style={{fontSize:18,color,fontFamily:"'Bebas Neue',sans-serif",lineHeight:1,marginTop:4}}>{value}g</div>
    </div>
  );
}

function ProfileView({ profile, updateProfile, targets }) {
  const [local, setLocal] = useState(profile);
  useEffect(()=>setLocal(profile),[profile]);
  const update = (field, value) => { const newP = { ...local, [field]: value }; setLocal(newP); updateProfile(newP); };
  return (
    <div className="fade-in" style={{maxWidth:720,margin:"0 auto",padding:"0 20px"}}>
      <div style={{fontSize:10,color:"#555",letterSpacing:3,marginBottom:10}}>YOUR STATS</div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:8,padding:16,marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div>
            <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:5}}>WEIGHT (KG)</div>
            <input type="number" value={local.weight} onChange={(e)=>update("weight",e.target.value)} placeholder="75" />
          </div>
          <div>
            <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:5}}>HEIGHT (CM)</div>
            <input type="number" value={local.height} onChange={(e)=>update("height",e.target.value)} placeholder="175" />
          </div>
          <div>
            <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:5}}>AGE</div>
            <input type="number" value={local.age} onChange={(e)=>update("age",e.target.value)} placeholder="30" />
          </div>
          <div>
            <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:5}}>SEX</div>
            <select value={local.sex} onChange={(e)=>update("sex",e.target.value)}>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
        </div>
      </div>
      <div style={{fontSize:10,color:"#555",letterSpacing:3,marginBottom:10}}>STEP GOAL</div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:8,padding:16,marginBottom:14}}>
        <input type="number" min="1000" step="500" value={local.stepGoal||10000} onChange={(e)=>update("stepGoal",parseInt(e.target.value)||10000)} />
      </div>
      <div style={{fontSize:10,color:"#555",letterSpacing:3,marginBottom:10}}>ACTIVITY LEVEL</div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:8,padding:16,marginBottom:14}}>
        <select value={local.activity} onChange={(e)=>update("activity",e.target.value)}>
          <option value="sedentary">Sedentary (desk job, little exercise)</option>
          <option value="light">Light (1–3 days/week training)</option>
          <option value="moderate">Moderate (3–5 days/week training)</option>
          <option value="active">Active (6–7 days/week training)</option>
          <option value="athlete">Athlete (2x/day or hard physical job)</option>
        </select>
      </div>
      <div style={{fontSize:10,color:"#555",letterSpacing:3,marginBottom:10}}>GOAL</div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:8,padding:16,marginBottom:14}}>
        <select value={local.goal} onChange={(e)=>update("goal",e.target.value)}>
          <option value="cut">Cut — lose fat (-500 kcal)</option>
          <option value="recomp">Recomp — slow lean (-250 kcal)</option>
          <option value="maintain">Maintain</option>
          <option value="lean_bulk">Lean Bulk (+250 kcal)</option>
          <option value="bulk">Bulk — fast gain (+500 kcal)</option>
        </select>
      </div>
      {targets && <div style={{background:"#0d0d0d",border:"1px solid #FF6B3533",borderLeft:"3px solid #FF6B35",borderRadius:8,padding:16}}>
        <div style={{fontSize:10,color:"#FF6B35",letterSpacing:3,marginBottom:12}}>YOUR DAILY TARGETS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div>
            <div style={{fontSize:9,color:"#555",letterSpacing:2}}>BMR</div>
            <div style={{fontSize:18,color:"#888",fontFamily:"'Bebas Neue',sans-serif"}}>{targets.bmr} kcal</div>
          </div>
          <div>
            <div style={{fontSize:9,color:"#555",letterSpacing:2}}>TDEE</div>
            <div style={{fontSize:18,color:"#888",fontFamily:"'Bebas Neue',sans-serif"}}>{targets.tdee} kcal</div>
          </div>
        </div>
        <div style={{background:"#111",borderRadius:4,padding:12,marginBottom:8}}>
          <div style={{fontSize:9,color:"#555",letterSpacing:2}}>TARGET CALORIES</div>
          <div style={{fontSize:32,color:"#FF6B35",fontFamily:"'Bebas Neue',sans-serif",lineHeight:1,marginTop:4}}>{targets.kcal} <span style={{fontSize:12,color:"#666"}}>kcal/day</span></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
          <MacroTarget label="PROTEIN" value={targets.p} color="#FF6B35" />
          <MacroTarget label="CARBS" value={targets.c} color="#FFE66D" />
          <MacroTarget label="FAT" value={targets.f} color="#A78BFA" />
        </div>
        <div style={{fontSize:10,color:"#666",marginTop:12,lineHeight:1.5}}>Mifflin-St Jeor BMR. Protein 2g/kg, fat 25%. Calorie burn uses MET values.</div>
      </div>}
      {!targets && <div style={{padding:20,textAlign:"center",color:"#666",fontSize:12,border:"1px dashed #333",borderRadius:8}}>Fill in weight, height & age to calculate your targets.</div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<IronLog />);
</script>
</body>
</html>
